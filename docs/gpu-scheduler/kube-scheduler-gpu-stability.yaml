apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
leaderElection:
  leaderElect: true
  resourceName: space-compute-scheduler
  resourceNamespace: kube-system
profiles:
- schedulerName: space-compute-scheduler
  plugins:
    preFilter:
      enabled:
      - name: K3SGPUStability
    filter:
      enabled:
      - name: K3SGPUStability
    preScore:
      enabled:
      - name: K3SGPUStability
    score:
      enabled:
      - name: K3SGPUStability
        weight: 5
  pluginConfig:
  - name: K3SGPUStability
    args:
      apiVersion: gpustability.k3s.io/v1alpha1
      kind: K3SGPUStabilityArgs
      exporter:
        scheme: https
        port: "32021"
        path: /metrics
        profile: auto
        timeout: 2s
        maxResponseBytes: 4194304
        maxMetricFamilies: 10000
        maxSamples: 100000
        maxLabelsPerSample: 64
        maxDevicesPerNode: 256
        allowInsecureHTTP: false
        allowExternalIP: false
        caFile: /var/lib/rancher/k3s/server/tls/gpu-exporter-ca.crt
        certFile: /var/lib/rancher/k3s/server/tls/gpu-exporter-client.crt
        keyFile: /var/lib/rancher/k3s/server/tls/gpu-exporter-client.key
      collector:
        workers: 4
        queueSize: 1024
        cacheMaxEntries: 4096
        snapshotTTL: 10s
        refreshInterval: 5s
        backoffBase: 1s
        backoffMax: 1m
        circuitFailures: 5
        circuitOpenDuration: 2m
        jitterFraction: 0.2
      discovery:
        addressTypes: [InternalIP]
        preferredIPFamily: ipv4
      profileSource:
        reloadInterval: 30s
        maxBytes: 1048576
      queueing:
        maxTrackedPods: 10000
        blockedPodTTL: 10m
      policy:
        defaultStatePolicy: strict
        maxTemperatureC: 90
        targetTemperatureC: 70
        minSMClockMHz: 1
        minMemoryClockMHz: 1
        maxPowerWatts: 500
        degradedScore: 20
        bestEffortScore: 10
        scoreAllPods: false
        scoring:
          utilization: 10
          memoryHeadroom: 10
          thermalHeadroom: 10
          energyHeadroom: 10
          computeCapability: 10
          health: 5
          dataLocality: 10
          fragmentation: 10
          predictedCompletion: 10
          linkRisk: 10
          resilience: 5
