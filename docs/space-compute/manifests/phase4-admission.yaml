apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: space-compute-phase4-placement-owner
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [spacecompute.k3s.io]
      apiVersions: [v1alpha1]
      operations: [CREATE, UPDATE]
      resources: [spaceplacementintents]
  validations:
  - expression: "request.userInfo.username == 'system:serviceaccount:kube-system:space-compute-mission-planner'"
    message: only the mission planner ServiceAccount may create or update placement intent
---
