apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spacelinksnapshots.spacecompute.k3s.io
spec:
  group: spacecompute.k3s.io
  scope: Cluster
  names: {plural: spacelinksnapshots, singular: spacelinksnapshot, kind: SpaceLinkSnapshot, shortNames: [slink]}
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources: {status: {}}
    schema:
      openAPIV3Schema:
        type: object
        required: [spec]
        properties:
          apiVersion: {type: string}
          kind: {type: string}
          metadata: {type: object}
          spec:
            type: object
            required: [source, destination, observedAt, validUntil, maximumClockSkewSeconds, minimumUpdateSeconds, historyLimit, provenance, windows]
            x-kubernetes-validations:
            - rule: "self.source.name != self.destination.name || self.source.clusterID != self.destination.clusterID"
              message: source and destination must differ
            - rule: "timestamp(self.validUntil) > timestamp(self.observedAt)"
              message: validUntil must be after observedAt
            - rule: "self.windows.all(w, timestamp(w.end) > timestamp(w.start))"
              message: every contact window end must be after start
            - rule: "self.windows.all(w, self.windows.filter(x, x.id != w.id).all(x, timestamp(x.end) <= timestamp(w.start) || timestamp(x.start) >= timestamp(w.end)))"
              message: contact windows must not overlap
            properties:
              source: &domain
                type: object
                required: [name, clusterID, orbitClass]
                properties:
                  name: {type: string, maxLength: 253, pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'}
                  clusterID: {type: string, maxLength: 253, pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'}
                  orbitClass: {type: string, enum: [ground, leo, meo, geo, heo]}
              destination: *domain
              observedAt: {type: string, format: date-time}
              validUntil: {type: string, format: date-time}
              maximumClockSkewSeconds: {type: integer, format: int64, minimum: 0, maximum: 600}
              minimumUpdateSeconds: {type: integer, format: int64, minimum: 1, maximum: 3600}
              historyLimit: {type: integer, format: int32, minimum: 1, maximum: 64}
              provenance:
                type: object
                required: [reporterID, source, digest, sequence]
                properties:
                  reporterID: {type: string, minLength: 1, maxLength: 253}
                  source: {type: string, minLength: 1, maxLength: 256}
                  digest: {type: string, pattern: '^[a-f0-9]{64}$'}
                  sequence: {type: integer, format: int64, minimum: 1}
              windows:
                type: array
                minItems: 1
                maxItems: 256
                x-kubernetes-list-type: map
                x-kubernetes-list-map-keys: [id]
                items:
                  type: object
                  required: [id, start, end, bandwidthBitsPerSecond, rttMicroseconds, lossPartsPerMillion, errorPartsPerMillion, stabilityMilli, confidenceMilli, predicted]
                  properties:
                    id: {type: string, maxLength: 63}
                    start: {type: string, format: date-time}
                    end: {type: string, format: date-time}
                    bandwidthBitsPerSecond: {type: integer, format: int64, minimum: 1, maximum: 10000000000000}
                    rttMicroseconds: {type: integer, format: int64, minimum: 0, maximum: 86400000000}
                    lossPartsPerMillion: {type: integer, format: int32, minimum: 0, maximum: 1000000}
                    errorPartsPerMillion: {type: integer, format: int32, minimum: 0, maximum: 1000000}
                    stabilityMilli: {type: integer, format: int32, minimum: 0, maximum: 1000}
                    confidenceMilli: {type: integer, format: int32, minimum: 0, maximum: 1000}
                    predicted: {type: boolean}
          status: {type: object, x-kubernetes-preserve-unknown-fields: true}
