              maximumDurationSeconds: {type: integer, format: int64, minimum: 1, maximum: 2592000}
              durationUncertaintySeconds: {type: integer, format: int64, minimum: 0}
              safetyMarginSeconds: {type: integer, format: int64, minimum: 0, maximum: 86400}
              maximumClockSkewSeconds: {type: integer, format: int64, minimum: 0, maximum: 600}
              resultReturnRequired: {type: boolean}
