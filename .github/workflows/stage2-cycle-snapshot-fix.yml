name: Stage2 cycle snapshot consistency fix
on:
  push:
    branches: [main]
    paths: [.github/workflows/stage2-cycle-snapshot-fix.yml]
permissions:
  contents: write
  statuses: write
concurrency:
  group: stage2-cycle-snapshot-main-fix
  cancel-in-progress: false
jobs:
  fix-test-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Publish run identity
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPOSITORY: ${{ github.repository }}
        COMMIT_SHA: ${{ github.sha }}
        RUN_ID: ${{ github.run_id }}
        SERVER_URL: ${{ github.server_url }}
      run: |
        set -euo pipefail
        curl --fail-with-body --silent --show-error -X POST \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${REPOSITORY}/statuses/${COMMIT_SHA}" \
          -d "{\"state\":\"pending\",\"description\":\"validating focused/race/full gates\",\"context\":\"sandbox/stage2-cycle-${RUN_ID}\",\"target_url\":\"${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}
        fetch-depth: 1
    - uses: actions/setup-go@v5
      with:
        go-version: '1.25.12'
        cache: false
    - name: Apply fix
      shell: bash
      run: |
        set -euo pipefail
        python3 - <<'PY'
        import base64,gzip
        from pathlib import Path
        encoded=Path('.github/stage2-cycle-snapshot.patch.gz.b64').read_text().strip()
        Path('/tmp/stage2.patch').write_bytes(gzip.decompress(base64.b64decode(encoded)))
        PY
        git apply --check /tmp/stage2.patch
        git apply /tmp/stage2.patch
        python3 - <<'PY'
        from pathlib import Path
        path = Path('pkg/scheduler/plugins/gpustability/phase5_cycle_snapshot_test.go')
        text = path.read_text()
        old = 'func TestRequestedResourcesRemainCycleLocal(t *testing.T) {\n\tplugin := newTestPlugin(t, iluvatarMetrics)'
        new = 'func TestRequestedResourcesRemainCycleLocal(t *testing.T) {\n\tplugin := newTestPlugin(t, readPhase2Fixture(t, "iluvatar-2gpu.prom"))'
        if text.count(old) != 1:
            raise SystemExit(f'expected one Requested fixture replacement, found {text.count(old)}')
        path.write_text(text.replace(old, new, 1))
        PY
        gofmt -w pkg/scheduler/plugins/gpustability/gpu_stability.go pkg/scheduler/plugins/gpustability/snapshot_store.go pkg/scheduler/plugins/gpustability/gpu_stability_test.go pkg/scheduler/plugins/gpustability/phase3_test.go pkg/scheduler/plugins/gpustability/phase5_cycle_snapshot_test.go
    - name: Focused regressions after fixture correction
      shell: bash
      run: |
        set -euo pipefail
        go test ./pkg/scheduler/plugins/gpustability -run '^(TestCycleSnapshotPinsGenerationAcrossPreScore|TestCycleSnapshotExpiryAppliesNextCycleOnly|TestCycleSnapshotSurvivesCollectorFailureAfterFilter|TestPreScoreRequiresCompleteFilterPinnedSnapshot|TestCycleSnapshotCloneDeepCopiesMutableFields|TestRequestedResourcesRemainCycleLocal|TestParallelFiltersPinCycleSnapshotsRaceFree|TestPreScoreAndScorePreferTightFitGPUNode|TestPreScoreAggregatesThreeExporterNodes|TestScoringBreakdownGoldenAndFixedNormalization)$' -count=1 -timeout=120s 2>&1 | tee /tmp/stage2-focused.log
    - name: Upload focused failure diagnostics
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: stage2-focused-${{ github.run_id }}
        path: /tmp/stage2-focused.log
        if-no-files-found: error
    - name: Race regressions
      run: go test -race ./pkg/scheduler/plugins/gpustability -run '^(TestParallelFiltersPinCycleSnapshotsRaceFree|TestCycleSnapshotCloneDeepCopiesMutableFields|TestCycleSnapshotPinsGenerationAcrossPreScore|TestCycleSnapshotExpiryAppliesNextCycleOnly|TestCycleSnapshotSurvivesCollectorFailureAfterFilter)$' -count=1 -timeout=180s
    - name: Full CPU qualification
      shell: bash
      run: |
        set -euo pipefail
        {
          env GOCACHE="$RUNNER_TEMP/space-compute-stage2-gocache" scripts/space-compute all
          go test ./pkg/executor/embed -count=1
        } 2>&1 | tee /tmp/stage2-full.log
    - name: Upload full qualification failure diagnostics
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: stage2-full-${{ github.run_id }}
        path: /tmp/stage2-full.log
        if-no-files-found: error
    - name: Audit source boundary
      shell: bash
      run: |
        set -euo pipefail
        test -z "$(gofmt -s -l pkg/scheduler/plugins/gpustability/*.go)"
        go vet ./pkg/scheduler/plugins/gpustability
        python3 - <<'PY'
        from pathlib import Path
        g=Path('pkg/scheduler/plugins/gpustability/gpu_stability.go').read_text()
        p=g[g.index('func (p *Plugin) PreScore'):g.index('func (p *Plugin) Score(')]
        assert 'collector.' not in p and 'lookupSnapshotForNodeInfo' not in p
        s=Path('pkg/scheduler/plugins/gpustability/snapshot_store.go').read_text()
        u=s[s.index('type unifiedSnapshot struct {'):s.index('type snapshotStore struct {')]
        assert 'Requested' not in u and 'Resources nodeResourceContext' not in u
        PY
    - name: Record status and push tested fix
      shell: bash
      env:
        RUN_ID: ${{ github.run_id }}
        TRIGGER_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail
        cat >> docs/space-compute/IMPLEMENTATION_STATUS.md <<EOF

        ## Phase 5 focused scheduling-cycle snapshot consistency hardening (2026-07-24)

        Root cause: Filter and PreScore independently read the collector, so one scheduling cycle could cross target generations, TTL freshness transitions or post-Filter collection failures. The global snapshot shape also still retained cycle-specific Requested state.

        Production fix: PreFilter initializes a concurrency-safe cycleNodeSnapshotState; each Node's first Filter read deep-copies and pins metrics/device fields, state, ObservedAt, ValidUntil, profile, confidence, target generation, reason and Node resource context. PreScore and Score require Filter-pinned state and return framework.Error for missing/incomplete state; neither re-reads the collector. Global snapshots now persist allocatable resources only; NodeInfo.Requested exists only in the cycle-local snapshot. Clone logic deep-copies maps, slices and device field maps.

        Regression coverage includes generation update after Filter, expiry after Filter with next-cycle stale transition, post-Filter collector failure, missing/incomplete Filter state, cycle-local Requested ownership, deep-clone isolation and 64 parallel Filter writes under the race detector.

        - Focused regression set: PASS in GitHub Actions run ${RUN_ID} from main snapshot ${TRIGGER_SHA}.
        - Focused go test -race: PASS in the same run.
        - scripts/space-compute all: PASS.
        - go test ./pkg/executor/embed -count=1: PASS; default K3s remains independent.
        - gofmt, go vet and source-boundary audit: PASS.

        The local interactive container cannot download Go 1.25.12 because external DNS is disabled; authoritative validation therefore ran in GitHub Actions. The final push is normal/non-force and Phase 5 release blockers remain unchanged.
        EOF
        rm .github/workflows/stage2-cycle-snapshot-fix.yml .github/stage2-cycle-snapshot.patch.gz.b64
        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add pkg/scheduler/plugins/gpustability/gpu_stability.go pkg/scheduler/plugins/gpustability/snapshot_store.go pkg/scheduler/plugins/gpustability/gpu_stability_test.go pkg/scheduler/plugins/gpustability/phase3_test.go pkg/scheduler/plugins/gpustability/phase5_cycle_snapshot_test.go docs/space-compute/PROJECT.md docs/gpu-scheduler/README.md docs/space-compute/IMPLEMENTATION_STATUS.md
        git add -u -- .github/workflows/stage2-cycle-snapshot-fix.yml .github/stage2-cycle-snapshot.patch.gz.b64
        git diff --cached --check
        git commit -m 'fix: pin exporter snapshots per scheduling cycle'
        git push origin HEAD:main
    - name: Publish final status
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPOSITORY: ${{ github.repository }}
        COMMIT_SHA: ${{ github.sha }}
        RUN_ID: ${{ github.run_id }}
        SERVER_URL: ${{ github.server_url }}
        JOB_STATUS: ${{ job.status }}
      run: |
        set -euo pipefail
        state=failure
        description='stage2 validation failed'
        if [ "$JOB_STATUS" = success ]; then
          state=success
          description='stage2 validation passed and fix pushed'
        fi
        curl --fail-with-body --silent --show-error -X POST \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${REPOSITORY}/statuses/${COMMIT_SHA}" \
          -d "{\"state\":\"${state}\",\"description\":\"${description}\",\"context\":\"sandbox/stage2-cycle-${RUN_ID}\",\"target_url\":\"${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
