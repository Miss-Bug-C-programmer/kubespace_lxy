name: Validated exporter hot-path fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/hotpath-validated-fix.yml

permissions:
  contents: write
  statuses: write

concurrency:
  group: validated-exporter-hotpath-main-fix
  cancel-in-progress: false

jobs:
  test-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Publish run identity
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"pending\",\"context\":\"sandbox/hotpath-fix-${RUN_ID}\",\"target_url\":\"${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}\"}"

      - name: Checkout exact main snapshot
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up verified Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: false

      - name: Apply production fix and regressions
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/hotpath-main-fix.yml').read_text().splitlines()
          patch_start = workflow.index("          python3 <<'PY'") + 1
          patch_end = workflow.index('          PY', patch_start)
          patch_lines = [line[10:] if line.startswith('          ') else line for line in workflow[patch_start:patch_end]]
          Path('/tmp/apply-hotpath.py').write_text('\n'.join(patch_lines) + '\n')

          test_marker = "          cat > pkg/scheduler/plugins/gpustability/phase5_hotpath_test.go <<'EOF'"
          test_start = workflow.index(test_marker) + 1
          test_end = workflow.index('          EOF', test_start)
          test_lines = [line[10:] if line.startswith('          ') else line for line in workflow[test_start:test_end]]
          Path('pkg/scheduler/plugins/gpustability/phase5_hotpath_test.go').write_text('\n'.join(test_lines) + '\n')
          PY
          python3 /tmp/apply-hotpath.py
          python3 - <<'PY'
          from pathlib import Path

          path = Path('pkg/scheduler/plugins/gpustability/collector.go')
          text = path.read_text()
          marker = '// requestRefreshExisting queues a refresh only for the exact generation that\n// was already discovered by the Node informer. enqueue is bounded and\n'
          alias_lines = [
              '// snapshotForNodeInfo is retained for collector-facing callers and tests. Like',
              '// the scheduler accessor it never creates or resolves a target; a miss may only',
              '// request a non-blocking refresh for an already discovered generation.',
              'func (c *collector) snapshotForNodeInfo(nodeInfo *framework.NodeInfo) snapshotResult {',
              '\tresult := c.lookupSnapshotForNodeInfo(nodeInfo)',
              '\tif nodeInfo != nil && nodeInfo.Node() != nil && result.State != snapshotFresh && result.TargetGeneration != 0 {',
              '\t\tc.requestRefreshExisting(nodeInfo.Node().Name, result.TargetGeneration)',
              '\t}',
              '\treturn result',
              '}',
              '',
          ]
          if text.count(marker) != 1:
              raise SystemExit(f'collector compatibility marker count={text.count(marker)}')
          path.write_text(text.replace(marker, '\n'.join(alias_lines) + marker, 1))
          PY
          gofmt -w \
            pkg/scheduler/plugins/gpustability/collector.go \
            pkg/scheduler/plugins/gpustability/gpu_stability.go \
            pkg/scheduler/plugins/gpustability/queueing.go \
            pkg/scheduler/plugins/gpustability/phase1_test.go \
            pkg/scheduler/plugins/gpustability/phase5_hotpath_test.go

      - name: Focused hot-path regression tests
        shell: bash
        run: |
          set -euo pipefail
          go test ./pkg/scheduler/plugins/gpustability \
            -run '^(TestAnnotationOnlyPodAcrossOrdinaryNodesDoesNotCreateExporterTargets|TestSchedulerCallbacksCannotCreateTargetOrCallHTTP|TestDiscoveredAcceleratorCacheMissRequestsNonBlockingRefresh|TestSchedulingCycleDoesNotBlockWhenRefreshSuppressed|TestSchedulerCallbacksNeverWaitForExporterIO)$' \
            -count=1 -timeout=90s

      - name: Full CPU qualification gates
        shell: bash
        run: |
          set -euo pipefail
          env GOCACHE="$RUNNER_TEMP/space-compute-hotpath-gocache" scripts/space-compute all
          go test ./pkg/executor/embed -count=1

      - name: Audit hot-path boundary
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          collector = Path('pkg/scheduler/plugins/gpustability/collector.go').read_text()
          gpu = Path('pkg/scheduler/plugins/gpustability/gpu_stability.go').read_text()
          queueing = Path('pkg/scheduler/plugins/gpustability/queueing.go').read_text()

          def body(text, signature, next_signature):
              start = text.index(signature)
              end = text.index(next_signature, start)
              return text[start:end]

          lookup = body(collector, 'func (c *collector) lookupSnapshotForNodeInfo', 'func (c *collector) snapshotForNodeInfo')
          compatibility = body(collector, 'func (c *collector) snapshotForNodeInfo', 'func (c *collector) requestRefreshExisting')
          refresh = body(collector, 'func (c *collector) requestRefreshExisting', 'func (c *collector) enqueue')
          for name, block in [('lookupSnapshotForNodeInfo', lookup), ('snapshotForNodeInfo', compatibility), ('requestRefreshExisting', refresh)]:
              for forbidden in ('ensureTarget(', 'resolveTarget(', 'collectTarget(', 'client.Do('):
                  if forbidden in block:
                      raise SystemExit(f'{name} contains forbidden hot-path operation {forbidden}')
          for source_name, source in [('gpu_stability.go', gpu), ('queueing.go', queueing)]:
              for forbidden in ('ensureTarget(', 'resolveTarget(', 'snapshotForNode('):
                  if forbidden in source:
                      raise SystemExit(f'{source_name} retains forbidden scheduler target-creation path {forbidden}')
          PY
          test -z "$(gofmt -s -l pkg/scheduler/plugins/gpustability/*.go)"
          go vet ./pkg/scheduler/plugins/gpustability

      - name: Record tested implementation status
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path('docs/space-compute/IMPLEMENTATION_STATUS.md')
          text = path.read_text()
          marker = '## Phase 5 focused exporter hot-path hardening (2026-07-24)'
          if marker in text:
              raise SystemExit('focused hot-path status section already exists')
          run_id = os.environ['RUN_ID']
          run_sha = os.environ['RUN_SHA']
          section = f'''\n\n{marker}\n\nRoot cause: scheduler `Filter`/`PreScore` reached `snapshotForNode()`, which called `ensureTarget()` and therefore `resolveTarget()`. An annotation-only observational Pod could turn ordinary candidate Nodes into exporter targets and consume target, snapshot and queue capacity even though Node informer discovery excludes those Nodes. Direct HTTP remained worker-only, but target admission had leaked into the scheduling hot path.\n\nProduction fix: Node informer reconciliation is the only production target-creation path. Scheduler callbacks use `lookupSnapshotForNodeInfo()` to read an already discovered target and local snapshot state. Missing/stale state may call `requestRefreshExisting(nodeName, generation)`, which verifies the exact existing generation and uses the bounded non-blocking queue. It never resolves an endpoint or creates a target. Cycle-local requested-resource accounting is not written into the shared snapshot store by scheduler callbacks. Annotation-only observational Filter exits without collector work, and its Node queue hint skips ordinary Nodes.\n\nRegression coverage includes a 1,000-ordinary-Node annotation-only cycle with zero targets/cache/queue/HTTP calls; an undiscovered accelerator candidate proving callbacks cannot create targets or issue HTTP; an existing accelerator target cache miss proving non-blocking asynchronous refresh; and queue-full/backoff/circuit-open scheduling-cycle checks. The prior slow-exporter callback regression now explicitly pre-discovers its target.\n\n### Focused fix commands and results\n\n- Focused gpustability hot-path regression set: PASS in GitHub Actions run `{run_id}` from main snapshot `{run_sha}`.\n- `env GOCACHE=$RUNNER_TEMP/space-compute-hotpath-gocache scripts/space-compute all`: PASS in the same run before commit.\n- `go test ./pkg/executor/embed -count=1`: PASS; default K3s embed boundary remains independent of the plugin.\n- Hot-path source audit, gofmt check and `go vet ./pkg/scheduler/plugins/gpustability`: PASS.\n\nThe interactive execution container could not download the repository-pinned Go 1.25.12 toolchain because external DNS is disabled, so authoritative validation ran on the repository GitHub Actions runner against the exact triggering main snapshot. The workflow uses a normal non-force `HEAD:main` push; concurrent updates fail rather than being overwritten. Phase 5 remains active and existing release blockers are unchanged.\n'''
          path.write_text(text + section)
          PY

      - name: Commit tested fix directly to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/hotpath-main-fix.yml \
            .github/workflows/hotpath-source-export.yml \
            .github/workflows/hotpath-validated-fix.yml
          git config user.name "OpenAI Codex"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: isolate exporter targets from scheduler hot path"
          git push origin HEAD:main

      - name: Publish final status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          if [ "$JOB_STATUS" = success ]; then state=success; fi
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/statuses/${COMMIT_SHA}" \
            -d "{\"state\":\"${state}\",\"context\":\"sandbox/hotpath-fix-${RUN_ID}\",\"target_url\":\"${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}\"}"
