name: Exporter hot-path focused fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/hotpath-main-fix.yml

permissions:
  contents: write

concurrency:
  group: exporter-hotpath-main-fix
  cancel-in-progress: false

jobs:
  fix-test-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout triggering main snapshot
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up verified Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: false

      - name: Apply production fix and regressions
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement, found {count}")
              p.write_text(text.replace(old, new, 1))

          collector = "pkg/scheduler/plugins/gpustability/collector.go"
          replace_once(
              collector,
              '''\t// Background collection is limited to Nodes that advertise a configured
\t// physical resource or explicit exporter metadata. This keeps ordinary
\t// agents and control-plane Nodes out of the scrape/cache budget. An
\t// annotation-only workload can still resolve a target on demand.
''',
              '''\t// Background target admission is owned exclusively by the Node informer.
\t// Only Nodes that advertise a configured physical resource or explicit
\t// exporter metadata may consume target, queue, worker, or snapshot capacity.
''',
          )
          replace_once(
              collector,
              '''func (c *collector) snapshotForNode(node *v1.Node) snapshotResult {
\tif node == nil {
\t\treturn snapshotResult{State: snapshotMissing, Confidence: confidenceMissing, Reason: "node information is unavailable"}
\t}
\ttarget, _, err := c.ensureTarget(node)
\tif err != nil {
\t\tc.recordTargetError(node.Name, err)
\t\treturn snapshotResult{State: snapshotFailed, Confidence: confidenceFailed, Reason: err.Error()}
\t}
\tnow := c.now()
\tresult := c.store.lookup(target, now)
\tif result.State != snapshotFresh {
\t\tc.enqueue(target)
\t}
\tif result.State == snapshotFresh {
\t\tobserveSnapshotAge(now.Sub(result.ObservedAt))
\t}
\tobserveSnapshotRead(result.State)
\treturn result
}

func (c *collector) snapshotForNodeInfo(nodeInfo *framework.NodeInfo) snapshotResult {
\tif nodeInfo == nil || nodeInfo.Node() == nil {
\t\treturn snapshotResult{State: snapshotMissing, Confidence: confidenceMissing, Reason: "node information is unavailable"}
\t}
\tresult := c.snapshotForNode(nodeInfo.Node())
\tc.mu.RLock()
\ttarget, exists := c.targets[nodeInfo.Node().Name]
\tc.mu.RUnlock()
\tif !exists {
\t\treturn result
\t}
\tresources := resourceContextForNodeInfo(nodeInfo, c.config.ResourceMappings)
\tc.store.updateResources(target, resources)
\tresult.Resources = resources
\treturn result
}
''',
              '''func (c *collector) snapshotForNode(node *v1.Node) snapshotResult {
\tif node == nil {
\t\treturn snapshotResult{State: snapshotMissing, Confidence: confidenceMissing, Reason: "node information is unavailable"}
\t}
\tnodeInfo := framework.NewNodeInfo()
\tnodeInfo.SetNode(node)
\tresult := c.lookupSnapshotForNodeInfo(nodeInfo)
\tif result.State != snapshotFresh && result.TargetGeneration != 0 {
\t\tc.requestRefreshExisting(node.Name, result.TargetGeneration)
\t}
\treturn result
}

// lookupSnapshotForNodeInfo is the scheduler hot-path snapshot accessor. It may
// only read a target that the Node informer has already admitted; it never
// resolves endpoints, creates target generations, mutates the snapshot store,
// or waits for exporter I/O.
func (c *collector) lookupSnapshotForNodeInfo(nodeInfo *framework.NodeInfo) snapshotResult {
\tif nodeInfo == nil || nodeInfo.Node() == nil {
\t\tresult := snapshotResult{State: snapshotMissing, Confidence: confidenceMissing, Reason: "node information is unavailable"}
\t\tobserveSnapshotRead(result.State)
\t\treturn result
\t}
\tnode := nodeInfo.Node()
\tresources := resourceContextForNodeInfo(nodeInfo, c.config.ResourceMappings)
\tidentity := identityForNode(node)

\tc.mu.RLock()
\ttarget, exists := c.targets[node.Name]
\tc.mu.RUnlock()
\tif !exists || (identity.UID != "" && target.Identity.UID != "" && identity.UID != target.Identity.UID) {
\t\tresult := snapshotResult{
\t\t\tState: snapshotMissing, Confidence: confidenceMissing, Resources: resources,
\t\t\tReason: "exporter target has not been discovered for node",
\t\t}
\t\tobserveSnapshotRead(result.State)
\t\treturn result
\t}

\tnow := c.now()
\tresult := c.store.lookup(target, now)
\t// A store miss still carries the already-discovered target generation so the
\t// caller may request a non-blocking refresh without resolving or creating it.
\tresult.TargetGeneration = target.Generation
\t// Requested resources are cycle-local scheduler state. Do not write them back
\t// into the shared snapshot store from a scheduling callback.
\tresult.Resources = resources
\tif result.State == snapshotFresh {
\t\tobserveSnapshotAge(now.Sub(result.ObservedAt))
\t}
\tobserveSnapshotRead(result.State)
\treturn result
}

// requestRefreshExisting queues a refresh only for the exact generation that
// was already discovered by the Node informer. enqueue is bounded and
// non-blocking, including when the queue is full, the target is in backoff, or
// its circuit is open.
func (c *collector) requestRefreshExisting(nodeName string, generation uint64) bool {
\tif nodeName == "" || generation == 0 {
\t\treturn false
\t}
\tc.mu.RLock()
\ttarget, exists := c.targets[nodeName]
\tc.mu.RUnlock()
\tif !exists || target.Generation != generation {
\t\treturn false
\t}
\treturn c.enqueue(target)
}
''',
          )

          gpu = "pkg/scheduler/plugins/gpustability/gpu_stability.go"
          replace_once(
              gpu,
              '''\tsnapshot := p.collector.snapshotForNodeInfo(nodeInfo)
\tif requirement.Observational {
\t\tobserveFilterDecision(requirement.Policy, "observational")
\t\treturn nil
\t}
''',
              '''\tif requirement.Observational {
\t\tobserveFilterDecision(requirement.Policy, "observational")
\t\treturn nil
\t}
\tsnapshot := p.collector.lookupSnapshotForNodeInfo(nodeInfo)
\tif snapshot.State != snapshotFresh && snapshot.TargetGeneration != 0 {
\t\tp.collector.requestRefreshExisting(nodeName, snapshot.TargetGeneration)
\t}
''',
          )
          replace_once(
              gpu,
              '''\t\tsnapshot := p.collector.snapshotForNodeInfo(nodeInfo)
\t\tinput := nodeScoreInput{State: snapshot.State, Reason: snapshot.Reason, Space: spacepolicy.Evaluate(requirement.Space, node, p.clock)}
''',
              '''\t\tsnapshot := p.collector.lookupSnapshotForNodeInfo(nodeInfo)
\t\tif snapshot.State != snapshotFresh && snapshot.TargetGeneration != 0 {
\t\t\tp.collector.requestRefreshExisting(node.Name, snapshot.TargetGeneration)
\t\t}
\t\tinput := nodeScoreInput{State: snapshot.State, Reason: snapshot.Reason, Space: spacepolicy.Evaluate(requirement.Space, node, p.clock)}
''',
          )

          queueing = "pkg/scheduler/plugins/gpustability/queueing.go"
          replace_once(
              queueing,
              '''\tnewNode, newOK := newObj.(*v1.Node)
\tif !newOK || newNode == nil {
\t\treturn framework.QueueSkip, nil
\t}
\toldNode, oldOK := oldObj.(*v1.Node)
''',
              '''\tnewNode, newOK := newObj.(*v1.Node)
\tif !newOK || newNode == nil {
\t\treturn framework.QueueSkip, nil
\t}
\t// Observational Pods must not turn ordinary Node events into exporter work.
\t// Only informer-eligible accelerator/exporter Nodes can affect their score.
\tif requirement.Observational && (p.collector == nil || !p.collector.isBackgroundTarget(newNode)) {
\t\treturn framework.QueueSkip, nil
\t}
\toldNode, oldOK := oldObj.(*v1.Node)
''',
          )

          phase1 = "pkg/scheduler/plugins/gpustability/phase1_test.go"
          replace_once(
              phase1,
              '''\tstate := cycleStateForPod(t, plugin, pod)

\tstart := time.Now()
''',
              '''\tstate := cycleStateForPod(t, plugin, pod)
\tif _, _, err := collector.ensureTarget(node.Node()); err != nil {
\t\tt.Fatalf("discover existing target: %v", err)
\t}

\tstart := time.Now()
''',
          )
          PY

          cat > pkg/scheduler/plugins/gpustability/phase5_hotpath_test.go <<'EOF'
          package gpustability

          import (
          	"context"
          	"fmt"
          	"net/http"
          	"sync/atomic"
          	"testing"
          	"time"

          	v1 "k8s.io/api/core/v1"
          	metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"
          	"k8s.io/apimachinery/pkg/types"
          	"k8s.io/klog/v2"
          	"k8s.io/kubernetes/pkg/scheduler/framework"
          )

          func TestAnnotationOnlyPodAcrossOrdinaryNodesDoesNotCreateExporterTargets(t *testing.T) {
          	cfg := testConfig(t)
          	cfg.QueueSize = 1
          	cfg.CacheMaxEntries = 4096
          	cfg.RefreshInterval = time.Hour
          	var networkCalls atomic.Int64
          	collector, err := newCollector(context.Background(), cfg, &http.Client{Transport: roundTripFunc(func(*http.Request) (*http.Response, error) {
          		networkCalls.Add(1)
          		return nil, fmt.Errorf("scheduler callback attempted exporter HTTP")
          	})})
          	if err != nil {
          		t.Fatal(err)
          	}
          	t.Cleanup(collector.Close)
          	plugin := &Plugin{config: cfg, collector: collector}
          	pod := &v1.Pod{
          		ObjectMeta: metav1.ObjectMeta{Name: "observer", Annotations: map[string]string{AnnotationEnabled: "true"}},
          		Spec:       v1.PodSpec{Containers: []v1.Container{{Name: "observer"}}},
          	}
          	state := cycleStateForPod(t, plugin, pod)
          	nodes := make([]*framework.NodeInfo, 0, 1000)
          	for i := 0; i < 1000; i++ {
          		nodeInfo := hotPathOrdinaryNodeInfo(i)
          		if status := plugin.Filter(context.Background(), state, pod, nodeInfo); !status.IsSuccess() {
          			t.Fatalf("Filter node %d: %v", i, status)
          		}
          		nodes = append(nodes, nodeInfo)
          	}
          	if status := plugin.PreScore(context.Background(), state, pod, nodes); !status.IsSuccess() {
          		t.Fatalf("PreScore: %v", status)
          	}
          	for i, nodeInfo := range nodes {
          		if _, status := plugin.Score(context.Background(), state, pod, nodeInfo); !status.IsSuccess() {
          			t.Fatalf("Score node %d: %v", i, status)
          		}
          	}
          	collector.mu.RLock()
          	targets, discoveredNodes, pending := len(collector.targets), len(collector.nodes), len(collector.pending)
          	collector.mu.RUnlock()
          	if targets != 0 || discoveredNodes != 0 || pending != 0 || collector.store.len() != 0 || len(collector.queue) != 0 {
          		t.Fatalf("ordinary-node hot path consumed collector quota: targets=%d nodes=%d pending=%d snapshots=%d queue=%d", targets, discoveredNodes, pending, collector.store.len(), len(collector.queue))
          	}
          	if networkCalls.Load() != 0 {
          		t.Fatalf("annotation-only scheduling made %d exporter HTTP calls", networkCalls.Load())
          	}
          	if hint, err := plugin.queueOnNodeChange(klog.Background(), pod, nil, nodes[0].Node()); err != nil || hint != framework.QueueSkip {
          		t.Fatalf("ordinary Node add hint=%v err=%v, want QueueSkip", hint, err)
          	}
          }

          func TestSchedulerCallbacksCannotCreateTargetOrCallHTTP(t *testing.T) {
          	cfg := testConfig(t)
          	cfg.RefreshInterval = time.Hour
          	var networkCalls atomic.Int64
          	collector, err := newCollector(context.Background(), cfg, &http.Client{Transport: roundTripFunc(func(*http.Request) (*http.Response, error) {
          		networkCalls.Add(1)
          		return nil, fmt.Errorf("scheduler callback attempted exporter HTTP")
          	})})
          	if err != nil {
          		t.Fatal(err)
          	}
          	t.Cleanup(collector.Close)
          	plugin := &Plugin{config: cfg, collector: collector}
          	pod := gpuPod()
          	nodeInfo := nodeInfoWithNamedEndpointAndCapacity("undiscovered-gpu", "http://undiscovered-gpu:32021/metrics", "iluvatar.com/gpu", 1)
          	nodeInfo.Node().UID = types.UID("undiscovered-gpu-uid")
          	state := cycleStateForPod(t, plugin, pod)

          	if status := plugin.Filter(context.Background(), state, pod, nodeInfo); status.IsSuccess() || !contains(status.Message(), "not been discovered") {
          		t.Fatalf("Filter status=%v, want explicit missing discovered target", status)
          	}
          	if status := plugin.PreScore(context.Background(), state, pod, []*framework.NodeInfo{nodeInfo}); !status.IsSuccess() {
          		t.Fatalf("PreScore: %v", status)
          	}
          	if _, status := plugin.Score(context.Background(), state, pod, nodeInfo); !status.IsSuccess() {
          		t.Fatalf("Score: %v", status)
          	}
          	time.Sleep(25 * time.Millisecond)
          	collector.mu.RLock()
          	targets, discoveredNodes, pending := len(collector.targets), len(collector.nodes), len(collector.pending)
          	collector.mu.RUnlock()
          	if targets != 0 || discoveredNodes != 0 || pending != 0 || collector.store.len() != 0 || len(collector.queue) != 0 {
          		t.Fatalf("callbacks created collector state: targets=%d nodes=%d pending=%d snapshots=%d queue=%d", targets, discoveredNodes, pending, collector.store.len(), len(collector.queue))
          	}
          	if networkCalls.Load() != 0 {
          		t.Fatalf("callbacks made %d exporter HTTP calls", networkCalls.Load())
          	}
          }

          func TestDiscoveredAcceleratorCacheMissRequestsNonBlockingRefresh(t *testing.T) {
          	cfg := testConfig(t)
          	cfg.RefreshInterval = time.Hour
          	cfg.SnapshotTTL = time.Hour
          	started := make(chan struct{}, 1)
          	var networkCalls atomic.Int64
          	collector, err := newCollector(context.Background(), cfg, &http.Client{Transport: roundTripFunc(func(*http.Request) (*http.Response, error) {
          		networkCalls.Add(1)
          		select {
          		case started <- struct{}{}:
          		default:
          		}
          		return metricsResponse(iluvatarMetrics), nil
          	})})
          	if err != nil {
          		t.Fatal(err)
          	}
          	t.Cleanup(collector.Close)
          	plugin := &Plugin{config: cfg, collector: collector}
          	pod := gpuPod()
          	nodeInfo := nodeInfoWithNamedEndpointAndCapacity("discovered-gpu", "http://discovered-gpu:32021/metrics", "iluvatar.com/gpu", 1)
          	nodeInfo.Node().UID = types.UID("discovered-gpu-uid")
          	target, _, err := collector.ensureTarget(nodeInfo.Node())
          	if err != nil {
          		t.Fatalf("discover target: %v", err)
          	}
          	if result := collector.store.lookup(target, time.Now()); result.State != snapshotMissing {
          		t.Fatalf("initial snapshot state=%s, want missing", result.State)
          	}

          	state := cycleStateForPod(t, plugin, pod)
          	start := time.Now()
          	status := plugin.Filter(context.Background(), state, pod, nodeInfo)
          	if elapsed := time.Since(start); elapsed > 250*time.Millisecond {
          		t.Fatalf("Filter blocked for %v while requesting refresh", elapsed)
          	}
          	if status.IsSuccess() || !contains(status.Message(), "snapshot is not available") {
          		t.Fatalf("Filter status=%v, want explicit missing snapshot", status)
          	}
          	select {
          	case <-started:
          	case <-time.After(time.Second):
          		t.Fatal("existing discovered target did not receive asynchronous refresh")
          	}
          	waitFor(t, time.Second, func() bool { return collector.snapshotForNode(nodeInfo.Node()).State == snapshotFresh })
          	if networkCalls.Load() != 1 {
          		t.Fatalf("exporter calls=%d, want one coalesced asynchronous refresh", networkCalls.Load())
          	}
          }

          func TestSchedulingCycleDoesNotBlockWhenRefreshSuppressed(t *testing.T) {
          	t.Run("backoff", func(t *testing.T) {
          		testSuppressedRefreshCycle(t, failureState{NextTry: time.Now().Add(time.Minute)})
          	})
          	t.Run("circuit-open", func(t *testing.T) {
          		testSuppressedRefreshCycle(t, failureState{OpenUntil: time.Now().Add(time.Minute)})
          	})
          	t.Run("queue-full", func(t *testing.T) {
          		cfg := testConfig(t)
          		cfg.Workers = 1
          		cfg.QueueSize = 1
          		cfg.CacheMaxEntries = 8
          		cfg.RefreshInterval = time.Hour
          		started := make(chan struct{}, 1)
          		var networkCalls atomic.Int64
          		collector, err := newCollector(context.Background(), cfg, &http.Client{Transport: roundTripFunc(func(req *http.Request) (*http.Response, error) {
          			networkCalls.Add(1)
          			select {
          			case started <- struct{}{}:
          			default:
          			}
          			<-req.Context().Done()
          			return nil, req.Context().Err()
          		})})
          		if err != nil {
          			t.Fatal(err)
          		}
          		t.Cleanup(collector.Close)
          		plugin := &Plugin{config: cfg, collector: collector}

          		active := nodeInfoWithNamedEndpointAndCapacity("queue-active", "http://queue-active:32021/metrics", "iluvatar.com/gpu", 1)
          		filler := nodeInfoWithNamedEndpointAndCapacity("queue-filler", "http://queue-filler:32021/metrics", "iluvatar.com/gpu", 1)
          		candidate := nodeInfoWithNamedEndpointAndCapacity("queue-candidate", "http://queue-candidate:32021/metrics", "iluvatar.com/gpu", 1)
          		for _, nodeInfo := range []*framework.NodeInfo{active, filler, candidate} {
          			nodeInfo.Node().UID = types.UID(nodeInfo.Node().Name + "-uid")
          		}
          		activeTarget, _, err := collector.ensureTarget(active.Node())
          		if err != nil {
          			t.Fatal(err)
          		}
          		fillerTarget, _, err := collector.ensureTarget(filler.Node())
          		if err != nil {
          			t.Fatal(err)
          		}
          		if _, _, err := collector.ensureTarget(candidate.Node()); err != nil {
          			t.Fatal(err)
          		}
          		if !collector.enqueue(activeTarget) {
          			t.Fatal("failed to occupy collector worker")
          		}
          		select {
          		case <-started:
          		case <-time.After(time.Second):
          			t.Fatal("collector worker did not start")
          		}
          		if !collector.enqueue(fillerTarget) {
          			t.Fatal("failed to fill collector queue")
          		}

          		runMissingSnapshotSchedulingCycle(t, plugin, gpuPod(), candidate)
          		if networkCalls.Load() != 1 {
          			t.Fatalf("queue-full scheduling triggered %d HTTP calls, want only the already-active worker", networkCalls.Load())
          		}
          		if got := collector.lookupSnapshotForNodeInfo(candidate); got.State != snapshotMissing {
          			t.Fatalf("queue-full changed candidate snapshot state to %s, want missing", got.State)
          		}
          	})
          }

          func testSuppressedRefreshCycle(t *testing.T, failure failureState) {
          	t.Helper()
          	cfg := testConfig(t)
          	cfg.RefreshInterval = time.Hour
          	var networkCalls atomic.Int64
          	collector, err := newCollector(context.Background(), cfg, &http.Client{Transport: roundTripFunc(func(*http.Request) (*http.Response, error) {
          		networkCalls.Add(1)
          		return nil, fmt.Errorf("suppressed refresh reached HTTP")
          	})})
          	if err != nil {
          		t.Fatal(err)
          	}
          	t.Cleanup(collector.Close)
          	plugin := &Plugin{config: cfg, collector: collector}
          	nodeInfo := nodeInfoWithNamedEndpointAndCapacity("suppressed-gpu", "http://suppressed-gpu:32021/metrics", "iluvatar.com/gpu", 1)
          	nodeInfo.Node().UID = types.UID("suppressed-gpu-uid")
          	target, _, err := collector.ensureTarget(nodeInfo.Node())
          	if err != nil {
          		t.Fatal(err)
          	}
          	collector.mu.Lock()
          	collector.failures[target.Key] = failure
          	collector.mu.Unlock()

          	runMissingSnapshotSchedulingCycle(t, plugin, gpuPod(), nodeInfo)
          	if networkCalls.Load() != 0 {
          		t.Fatalf("suppressed scheduling refresh made %d HTTP calls", networkCalls.Load())
          	}
          	if got := collector.lookupSnapshotForNodeInfo(nodeInfo); got.State != snapshotMissing {
          		t.Fatalf("suppressed refresh changed snapshot state to %s, want missing", got.State)
          	}
          }

          func runMissingSnapshotSchedulingCycle(t *testing.T, plugin *Plugin, pod *v1.Pod, nodeInfo *framework.NodeInfo) {
          	t.Helper()
          	state := cycleStateForPod(t, plugin, pod)
          	start := time.Now()
          	if status := plugin.Filter(context.Background(), state, pod, nodeInfo); status.IsSuccess() {
          		t.Fatal("strict Filter succeeded with a missing snapshot")
          	}
          	if status := plugin.PreScore(context.Background(), state, pod, []*framework.NodeInfo{nodeInfo}); !status.IsSuccess() {
          		t.Fatalf("PreScore: %v", status)
          	}
          	if _, status := plugin.Score(context.Background(), state, pod, nodeInfo); !status.IsSuccess() {
          		t.Fatalf("Score: %v", status)
          	}
          	if elapsed := time.Since(start); elapsed > 250*time.Millisecond {
          		t.Fatalf("scheduling cycle blocked for %v", elapsed)
          	}
          }

          func hotPathOrdinaryNodeInfo(index int) *framework.NodeInfo {
          	nodeInfo := framework.NewNodeInfo()
          	nodeInfo.SetNode(&v1.Node{
          		ObjectMeta: metav1.ObjectMeta{Name: fmt.Sprintf("ordinary-%04d", index), UID: types.UID(fmt.Sprintf("ordinary-%04d-uid", index))},
          		Status: v1.NodeStatus{Addresses: []v1.NodeAddress{{
          			Type:    v1.NodeInternalIP,
          			Address: fmt.Sprintf("10.0.%d.%d", index/250+1, index%250+1),
          		}}},
          	})
          	return nodeInfo
          }
          EOF

          gofmt -w \
            pkg/scheduler/plugins/gpustability/collector.go \
            pkg/scheduler/plugins/gpustability/gpu_stability.go \
            pkg/scheduler/plugins/gpustability/queueing.go \
            pkg/scheduler/plugins/gpustability/phase1_test.go \
            pkg/scheduler/plugins/gpustability/phase5_hotpath_test.go

      - name: Focused hot-path regression tests
        shell: bash
        run: |
          set -euo pipefail
          go test ./pkg/scheduler/plugins/gpustability \
            -run '^(TestAnnotationOnlyPodAcrossOrdinaryNodesDoesNotCreateExporterTargets|TestSchedulerCallbacksCannotCreateTargetOrCallHTTP|TestDiscoveredAcceleratorCacheMissRequestsNonBlockingRefresh|TestSchedulingCycleDoesNotBlockWhenRefreshSuppressed|TestSchedulerCallbacksNeverWaitForExporterIO)$' \
            -count=1 -timeout=90s

      - name: Full CPU qualification gates
        shell: bash
        run: |
          set -euo pipefail
          env GOCACHE="${RUNNER_TEMP}/space-compute-hotpath-gocache" scripts/space-compute all
          go test ./pkg/executor/embed -count=1

      - name: Audit scheduler target-creation boundary
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          collector = Path("pkg/scheduler/plugins/gpustability/collector.go").read_text()
          gpu = Path("pkg/scheduler/plugins/gpustability/gpu_stability.go").read_text()

          def body(text: str, signature: str, next_signature: str) -> str:
              start = text.index(signature)
              end = text.index(next_signature, start)
              return text[start:end]

          lookup = body(collector, "func (c *collector) lookupSnapshotForNodeInfo", "func (c *collector) requestRefreshExisting")
          refresh = body(collector, "func (c *collector) requestRefreshExisting", "func (c *collector) enqueue")
          for name, block in [("lookupSnapshotForNodeInfo", lookup), ("requestRefreshExisting", refresh)]:
              for forbidden in ("ensureTarget(", "resolveTarget(", "collectTarget(", "client.Do("):
                  if forbidden in block:
                      raise SystemExit(f"{name} contains forbidden hot-path operation {forbidden}")
          for forbidden in ("ensureTarget(", "resolveTarget(", "snapshotForNode("):
              if forbidden in gpu:
                  raise SystemExit(f"scheduler callbacks retain forbidden target-creation path {forbidden}")
          PY
          test -z "$(gofmt -s -l pkg/scheduler/plugins/gpustability/*.go)"
          go vet ./pkg/scheduler/plugins/gpustability

      - name: Record focused fix evidence
        shell: bash
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          from pathlib import Path

          path = Path("docs/space-compute/IMPLEMENTATION_STATUS.md")
          text = path.read_text()
          marker = "## Phase 5 focused exporter hot-path hardening (2026-07-24)"
