icitly\n  pre-discovers its target instead of relying on the defective callback admission.\n\n### Focused fix commands and exact results\n\n| Command | Result |\n| --- | --- |\n| `go test ./pkg/scheduler/plugins/gpustability -run '^(TestAnnotationOnlyPodAcrossOrdinaryNodesDoesNotCreateExporterTargets|TestSchedulerCallbacksCannotCreateTargetOrCallHTTP|TestDiscoveredAcceleratorCacheMissRequestsNonBlockingRefresh|TestSchedulingCycleDoesNotBlockWhenRefreshSuppressed|TestSchedulerCallbacksNeverWaitForExporterIO)$' -count=1 -timeout=90s` | PASS in GitHub Actions run `{os.environ['RUN_ID']}` from main snapshot `{os.environ['RUN_SHA']}` |\n| `env GOCACHE=$RUNNER_TEMP/space-compute-hotpath-gocache scripts/space-compute all` | PASS in the same run; the repository unit/race/static/integration/scenario/fuzz/scale/build gate completed before commit |\n| `go test ./pkg/executor/embed -count=1` | PASS; default K3s embed boundary remains independent of the plugin |\n| hot-path source audit plus `gofmt -s -l pkg/scheduler/plugins/gpustability/*.go` and `go vet ./pkg/scheduler/plugins/gpustability` | PASS; callback accessors contain no target resolution/creation/HTTP operation and formatting/vet are clean |\n\nThe interactive execution container could not resolve `github.com`, so no local clone\nwas used. Validation above ran on the repository's GitHub Actions runner against the\nexact triggering main snapshot. The workflow pushes only after every listed command\nexits zero and uses a normal non-force `HEAD:main` push, so a concurrent main update\ncauses a non-fast-forward failure instead of overwriting it. Phase 5 remains active and\nthe existing release blockers are unchanged.\n'''
